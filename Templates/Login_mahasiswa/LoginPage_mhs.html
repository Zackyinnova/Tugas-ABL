        <style>
                body {
                    background-color: #f9f9ff;
                    font-family: 'Hanken Grotesk', sans-serif;
                }
                .login-card-shadow {
                    shadow: 0px 2px 4px rgba(0,0,0,0.05);
                }
                .glass-effect {
                    background: rgba(255, 255, 255, 0.8);
                    backdrop-filter: blur(10px);
                    border: 1px solid rgba(229, 231, 235, 0.5);
                }
            </style>
    </head>

    <body class="min-h-screen flex flex-col">

        <!-- Top Navigation Bar (Shared Component Strategy) -->
        <header class="bg-surface top-0 w-full border-b border-outline-variant shadow-sm z-50">
            <nav class="flex justify-between items-center w-full px-lg py-md max-w-7xl mx-auto">

                <div class="text-title-lg font-title-lg font-bold text-primary">Academic Portal</div>

                <div class="flex items-center gap-md">
                    <button class="text-secondary hover:text-primary transition-colors flex items-center gap-xs">
                        <span class="material-symbols-outlined text-[20px]">help_outline</span>
                        <span class="text-label-md font-label-md">Support</span>
                    </button>

                    <button class="text-secondary hover:text-primary transition-colors">
                        <span class="material-symbols-outlined">dark_mode</span>
                    </button>
                </div>
            </nav>
        </header>

        <!-- Main Content Canvas -->
        <main class="flex-grow flex items-center justify-center relative px-container-margin py-xl overflow-hidden">
            
            <!-- Subtle Background Decoration -->
            <div class="absolute inset-0 pointer-events-none overflow-hidden">
                <div class="absolute -top-24 -left-24 w-96 h-96 bg-primary-container opacity-5 rounded-full blur-3xl"></div>
                <div class="absolute -bottom-24 -right-24 w-96 h-96 bg-tertiary-container opacity-5 rounded-full blur-3xl"></div>
            </div>

            <!-- Login Container -->
            <div class="w-full max-w-[480px] z-10">

                <!-- Branding/Greeting -->
                <div class="text-center mb-xl">
                    <h1 class="text-display-lg font-display-lg text-on-background mb-base">Selamat Datang</h1>
                    <p class="text-body-lg font-body-lg text-secondary">Silakan masuk ke akun Academic Attendance System Anda</p>
                </div>

                <!-- Central Login Card -->
                <div class="bg-surface-container-lowest rounded-xl p-xl border border-outline-variant shadow-sm glass-effect">
                    
                    <form class="space-y-lg" id="loginForm">

                        <!-- NIM Field -->
                        <div class="space-y-xs">
                        <label class="block text-label-md font-label-md text-on-surface-variant" for="nim">NIM (Nomor Induk Mahasiswa)</label>
                        <div class="relative group">
                        <span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">person</span>
                        <input class="w-full pl-[48px] pr-md py-md bg-transparent border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all text-body-md font-body-md placeholder:text-secondary/50" id="nim" name="nim" placeholder="Masukkan NIM Anda" required="" type="text"/>
                        </div>
                        </div>

                        <!-- Password Field -->
                        <div class="space-y-xs">
                        <label class="block text-label-md font-label-md text-on-surface-variant" for="password">Kata Sandi</label>
                        <div class="relative group">
                        <span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">lock</span>
                        <input class="w-full pl-[48px] pr-md py-md bg-transparent border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all text-body-md font-body-md placeholder:text-secondary/50" id="password" name="password" placeholder="Masukkan Kata Sandi" required="" type="password"/>
                        </div>
                        </div>

                        <!-- Options -->
                        <div class="flex items-center justify-between py-xs">
                        
                            <label class="flex items-center gap-xs cursor-pointer select-none group">

                                <div class="relative flex items-center">
                                    <input class="peer h-5 w-5 cursor-pointer appearance-none rounded border border-outline transition-all checked:bg-primary checked:border-primary" type="checkbox"/>
                                    <span class="material-symbols-outlined absolute text-on-primary text-[14px] left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 opacity-0 peer-checked:opacity-100 transition-opacity pointer-events-none" style="font-variation-settings: 'FILL' 1;">check</span>
                                </div>
                                <span class="text-label-md font-label-md text-secondary group-hover:text-on-background transition-colors">Ingat Saya</span>
                            </label>

                            <a class="text-label-md font-label-md text-primary hover:underline transition-all" href="#">Lupa Kata Sandi?</a>
                        </div>

                        <!-- Submit Button -->
                        <button class="w-full bg-primary-container text-on-primary py-md px-lg rounded-lg font-semibold text-body-lg hover:bg-primary transition-all shadow-md active:scale-[0.98] flex justify-center items-center gap-sm" type="submit">
                            <span>Masuk</span>
                            <span class="material-symbols-outlined text-[20px]">login</span>
                        </button>

                    </form>
                </div>
                
                <!-- Additional Links/Info -->
                <div class="mt-lg text-center">
                    <p class="text-body-md font-body-md text-secondary">Belum memiliki akun? <a class="text-primary font-bold hover:underline" href="#">Hubungi Administrasi</a></p>
                </div>
            </div>

            <!-- Decorative Image/Illustration (Hidden on smaller screens) -->
            <div class="hidden xl:block absolute right-[-5%] top-1/2 -translate-y-1/2 w-1/3 max-w-[500px]">
                <div class="relative rounded-[40px] overflow-hidden shadow-2xl border-4 border-white rotate-3">
                    <img alt="University Campus" class="w-full h-full object-cover grayscale-[20%] hover:grayscale-0 transition-all duration-700" data-alt="A cinematic, high-angle shot of a group of diverse university students walking through a sun-drenched campus plaza with modern architectural buildings. The scene is bathed in warm, golden hour sunlight, highlighting the clean textures of the concrete and the lush green of manicured campus lawns. The overall mood is academic, aspirational, and professionally polished, aligning with a corporate light-mode UI aesthetic using soft blue and white tones." src="https://lh3.googleusercontent.com/aida-public/AB6AXuC2GPu2Q0kC0ZLpLJbs_sxFP8lZ5GP3aTWeSKDHMhiCGXRwiF_R0yjtkCZh6EYB6mF6G350xUePdYHw5V-o2XBr-kQg3Z5_2Muarl4a7CgvfyTfb_VxDnb101PkzJXvxoiWbnyXYmahLlGAnZfnck2CWrCb7hmhMeZtQ_2dKP-jvMftLWAvwkkwegrsqX_36pyEFp672ob7q_xZ5WpZoTTbfY9Z4Ilybk3P_jeRXGq-SbR86ysXWM1iTTRGgJ31I7bSks4-ficexpE"/>
                    <div class="absolute inset-0 bg-gradient-to-t from-primary/40 to-transparent"></div>
                </div>
            </div>
        </main>

        <!-- Footer (Shared Component Strategy) -->
        <footer class="bg-surface-container-lowest border-t border-outline-variant">
            <div class="w-full py-lg px-container-margin flex flex-col md:flex-row justify-between items-center gap-md max-w-7xl mx-auto">
            
                <div class="text-label-md font-label-md font-semibold text-on-surface">© 2024 Academic Attendance System. All rights reserved.</div>
                <div class="flex gap-lg items-center">
                    <a class="text-label-sm font-label-sm text-on-secondary-container hover:underline hover:text-primary transition-all duration-200" href="#">Privacy Policy</a>
                    <a class="text-label-sm font-label-sm text-on-secondary-container hover:underline hover:text-primary transition-all duration-200" href="#">Terms of Service</a>
                    <a class="text-label-sm font-label-sm text-on-secondary-container hover:underline hover:text-primary transition-all duration-200" href="#">Security</a>
                </div>
            </div>
        </footer>

        <script>
                // Simple micro-interactions
                document.getElementById('loginForm').addEventListener('submit', function(e) {
                    e.preventDefault();
                    const btn = e.target.querySelector('button[type="submit"]');
                    const originalContent = btn.innerHTML;
                    
                    // Visual feedback for click
                    btn.innerHTML = `<span class="material-symbols-outlined animate-spin">sync</span> <span>Memproses...</span>`;
                    btn.classList.add('opacity-80', 'cursor-not-allowed');
                    
                    setTimeout(() => {
                        btn.innerHTML = originalContent;
                        btn.classList.remove('opacity-80', 'cursor-not-allowed');
                        alert('Sistem sedang melakukan validasi kredensial Anda.');
                    }, 1500);
                });

                // Background parallax effect
                document.addEventListener('mousemove', (e) => {
                    const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
                    const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
                    const card = document.querySelector('.login-card-shadow');
                    if (card) {
                        card.style.transform = `translate(${moveX}px, ${moveY}px)`;
                    }
                });
            </script>
    </body>
</html>
